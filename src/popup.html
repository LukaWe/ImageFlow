<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Image Flow</title>
  <style>
    :root {
      --accent: #ff4500;
      --accent-2: #ff2d55;
      --bg: #16181d;
      --surface: #1f232b;
      --border: #2c313b;
      --fg: #f2f3f5;
      --muted: #a9b0bb;
    }
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      padding: 14px;
      background: var(--bg);
      color: var(--fg);
      font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    h1 { font-size: 15px; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
    h1 .logo { width: 22px; height: 22px; border-radius: 6px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
    label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
    .row { display: flex; gap: 8px; }
    input, select {
      width: 100%; background: var(--surface); color: var(--fg);
      border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); }
    .prefix { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
    .prefix span { padding: 0 4px 0 10px; color: var(--muted); }
    .prefix input { border: none; background: transparent; }
    button.primary {
      width: 100%; margin-top: 14px; background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff; border: none; border-radius: 9px; padding: 11px; font-weight: 700; font-size: 14px; cursor: pointer;
    }
    button.primary:hover { filter: brightness(1.07); }
    .status { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-top: 12px; color: var(--muted); }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #888; }
    .dot.in { background: #35c46a; }
    .dot.out { background: #ffb020; }
    .hint { font-size: 11.5px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
    .foot { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
    .link { color: #7cc0ff; text-decoration: none; font-size: 12.5px; cursor: pointer; background: none; border: none; padding: 0; }
    .quick { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chip { font-size: 11.5px; background: var(--surface); border: 1px solid var(--border); color: var(--fg); border-radius: 999px; padding: 4px 10px; cursor: pointer; }
    .chip:hover { border-color: var(--accent); }
    .auth { width: 100%; margin-top: 10px; background: var(--surface); color: var(--fg); border: 1px solid var(--border); border-radius: 8px; padding: 9px; font-weight: 600; cursor: pointer; }
    .auth:hover { border-color: var(--accent); }
    .auth:disabled { opacity: 0.6; cursor: default; }
  </style>
</head>
<body>
  <h1><span class="logo"></span> Image Flow</h1>

  <label for="sub">Subreddit</label>
  <div class="prefix">
    <span>r/</span>
    <input id="sub" type="text" placeholder="pics" autocomplete="off" spellcheck="false" />
  </div>
  <div class="quick" id="quick"></div>

  <label for="sort">Sort</label>
  <select id="sort">
    <option value="hot">Hot</option>
    <option value="new">New</option>
    <option value="top">Top</option>
    <option value="rising">Rising</option>
    <option value="best">Best</option>
  </select>

  <button class="primary" id="open">Start Gallery ▸</button>

  <div class="status">
    <span class="dot" id="loginDot"></span>
    <span id="loginText">Checking Reddit connection…</span>
  </div>
  <div class="hint" id="loginHint"></div>
  <button id="authBtn" class="auth" style="display:none">Open Reddit login</button>

  <div class="foot">
    <button class="link" id="settings">⚙ Settings</button>
    <button class="link" id="help">Shortcuts: press “?” in gallery</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
